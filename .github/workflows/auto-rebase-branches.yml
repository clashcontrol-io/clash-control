name: Auto-rebase open branches onto main

on:
  push:
    branches: [main]

jobs:
  rebase:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase all claude/ branches onto main
        run: |
          git fetch --all --prune
          BRANCHES=$(git branch -r | grep 'origin/claude/' | sed 's|[[:space:]]*origin/||')
          for branch in $BRANCHES; do
            echo "── $branch ──"
            git checkout -B "$branch" "origin/$branch"
            if git rebase origin/main; then
              git push --force-with-lease origin "$branch"
              echo "✓ rebased and pushed"
            else
              git rebase --abort
              echo "⚠ conflicts detected, skipping (manual rebase needed)"
            fi
          done
